# Glitchberry — tmux theme  [generated by ~/.config/theme/generate.sh]

# status bar
set -g status-style "bg=default,fg=#64748B"
set -g message-style "bg=#22252E,fg=#E2E8F0"
set -g mode-style "bg=#33365A,fg=#E2E8F0"

# pane borders
set -g pane-border-style "fg=#2A2F3A"
set -g pane-active-border-style "fg=#2A2F3A"

# popups — border-lines set from THEME_BORDER_STYLE in colors.sh
set -g popup-style "fg=#E2E8F0,bg=#1E1F22"
set -g popup-border-style "fg=#2A2F3A,bg=#1E1F22"
set -g popup-border-lines rounded

# expose palette as tmux env vars for scripts
set-environment -g THEME_BG "#1E1F22"
set-environment -g THEME_FG "#E2E8F0"
set-environment -g THEME_FG_BRIGHT "#FFFFFF"
set-environment -g THEME_MUTED "#94A3B8"
set-environment -g THEME_COMMENT "#64748B"
set-environment -g THEME_BORDER "#2A2F3A"
set-environment -g THEME_SUBTLE "#474F5E"
set-environment -g THEME_CURSORLINE "#22252E"
set-environment -g THEME_SELECTION "#33365A"
set-environment -g THEME_AMBER "#ECA563"
set-environment -g THEME_PURPLE "#A38AE6"
set-environment -g THEME_CYAN "#63BCC9"
set-environment -g THEME_GREEN "#85B679"
set-environment -g THEME_RED "#D47FA6"
set-environment -g THEME_SESSION_ACCENT "#A38AE6"
set-environment -g THEME_WINDOW_ACCENT "#D47FA6"
