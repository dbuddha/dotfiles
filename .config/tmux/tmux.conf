# --- General ---
# use Ctrl-A as prefix (more ergonomic than Ctrl-B)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# --- Performance ---
# eliminate Esc delay (critical for vim)
set -sg escape-time 0
# let vim detect focus changes
set -g focus-events on

# --- Terminal / Colors ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:Tc"

# --- Mouse ---
set -g mouse on
set -g set-clipboard on

# --- Windows & Panes ---
# start numbering at 1 (0 is far from prefix key)
set -g base-index 1
setw -g pane-base-index 1
# renumber windows when one is closed
set -g renumber-windows on
# don't auto-rename windows after manual rename
setw -g automatic-rename off

# intuitive splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# new window in current path
bind c new-window -c "#{pane_current_path}"

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode (vi) ---
setw -g mode-keys vi

# --- Theme (generated — colors from ~/.config/theme/colors.sh) ---
source-file ~/.config/theme/tmux-theme.conf

# --- Status bar ---
set -g status-position top
set -g status-interval 1
set -g status 2
set -g status-format[1] ""

# left: session list via script
set -g status-left-length 60
set -g status-left "#($HOME/.config/tmux/scripts/tmux-status-sessions)"

# center: empty (no window list in the middle)
set -g status-justify left
setw -g window-status-format ""
setw -g window-status-current-format ""

# right: window list via script
set -g status-right-length 60
set -g status-right "#($HOME/.config/tmux/scripts/tmux-status-windows)"

# --- Hooks (instant status refresh on window/session switch) ---
set-hook -g session-window-changed 'refresh-client -S'
set-hook -g window-linked 'refresh-client -S'

# --- Popups ---
bind S display-popup -w 40% -h 50% -E "$HOME/.config/tmux/scripts/tmux-pick-session"
bind W display-popup -w 40% -h 50% -E "$HOME/.config/tmux/scripts/tmux-pick-window"
bind ? display-popup -w 60% -h 80% -E "$HOME/.config/tmux/scripts/tmux-help"
